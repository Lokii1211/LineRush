name: Acquire Unity License (activation.alf)

# ──────────────────────────────────────────────────────────────────
#  PURPOSE
#  This workflow generates the .alf activation file that Unity
#  requires for headless (CI) license activation.
#
#  HOW TO USE
#  1. Go to Actions → "Acquire Unity License" → Run workflow
#  2. Download the generated .alf artifact
#  3. Go to https://license.unity3d.com/manual
#  4. Upload the .alf file and download the .ulf license file
#  5. Go to your GitHub repo Settings → Secrets and variables → Actions
#  6. Create a new secret named UNITY_LICENSE
#  7. Paste the ENTIRE contents of the .ulf file as the value
#  8. Also create UNITY_EMAIL and UNITY_PASSWORD secrets
# ──────────────────────────────────────────────────────────────────

on:
  workflow_dispatch: {}

jobs:
  activation:
    name: Request Unity Activation File 🔑
    runs-on: ubuntu-latest

    steps:
      - name: Request activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.0.58f2

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: Unity-Activation-File
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
          retention-days: 1
