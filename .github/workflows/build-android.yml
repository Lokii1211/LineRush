name: Build LineRush Android (APK + AAB)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Build APK'
        type: boolean
        default: true
      build_aab:
        description: 'Build AAB (for Play Store)'
        type: boolean
        default: true

env:
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

jobs:
  # ───────────────────────────────────────────────
  #  Activate Unity License + Build APK
  # ───────────────────────────────────────────────
  build-apk:
    name: "📱 Build APK"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_apk }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-

      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: Android
          buildName: LineRush
          androidAppBundle: false
          unityVersion: auto

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LineRush-APK-${{ github.run_number }}
          path: build/Android/
          retention-days: 30

  # ───────────────────────────────────────────────
  #  Build Android AAB (Play Store)
  # ───────────────────────────────────────────────
  build-aab:
    name: "🏪 Build AAB (Play Store)"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_aab }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-

      - name: Build Android AAB
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: Android
          buildName: LineRush
          androidAppBundle: true
          unityVersion: auto
          androidKeystoreName: ${{ secrets.ANDROID_KEYSTORE_NAME }}
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: LineRush-AAB-${{ github.run_number }}
          path: build/Android/
          retention-days: 30
